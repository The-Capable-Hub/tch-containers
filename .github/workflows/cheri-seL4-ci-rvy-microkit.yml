name: cheri-sel4-ci-riscv-microkit Build

on:
  push:
    branches:
      - main
    paths:
      - seL4/CI/rvy-microkit/**
      - .github/workflows/cheri-seL4-ci-rvy-microkit.yml
  workflow_dispatch: # Allows manual triggering of this workflow
  workflow_run:
    workflows: ["cheri-sel4-ci-riscv-base Build"] # trigger this workflow when base CI image is rebuilt
    types:
      - completed

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  build-and-push:
    uses: ./.github/workflows/cheri-seL4-ci-build-and-push.yml
    secrets: inherit
    with:
      image_name: cheri-sel4-ci-riscv-microkit
      dockerfile_path: sel4/CI/rvy-microkit/Dockerfile
