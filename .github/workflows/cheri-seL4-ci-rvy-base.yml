name: cheri-sel4-ci-riscv-base Build

on:
  push:
    branches:
      - main
    paths:
      - seL4/CI/rvy-base/**
      - .github/workflows/cheri-seL4-ci-rvy-base.yml
  workflow_dispatch: # Allows manual triggering of this workflow

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  build-and-push:
    uses: ./.github/workflows/cheri-seL4-ci-build-and-push.yml
    secrets: inherit
    with:
      image_name: cheri-sel4-ci-riscv-base
      dockerfile_path: seL4/CI/rvy-base/Dockerfile
      docker_build_args: |
        "LLVM_BRANCH=codasip-cheri-riscv-18"
        "LLVM_COMMIT_HASH=7ca5cdc690a7c41d3c45c53971a766812e730136"
        "QEMU_BRANCH=codasip-cheri-riscv_v3"
        "QEMU_COMMIT_HASH=HEAD"
        "OPENSBI_BRANCH=toooba-fixes"
        "OPENSBI_COMMIT_HASH=HEAD"
